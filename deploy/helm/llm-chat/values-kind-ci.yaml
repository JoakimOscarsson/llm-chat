ingress:
  enabled: false

cloudflareTunnel:
  enabled: false

sessionMigration:
  enabled: false

ollama:
  useStub: true
  maxParallelRequests: 1
  queuePromptAfterMs: 1000
  stubResponseDelayMs: 8000

services:
  web:
    replicaCount: 1
  api-gateway:
    replicaCount: 1
    autoscaling:
      enabled: false
  chat-service:
    replicaCount: 1
    autoscaling:
      enabled: false
  model-service:
    replicaCount: 1
  session-service:
    replicaCount: 1
    autoscaling:
      enabled: false
  metrics-service:
    replicaCount: 1
  ollama-adapter:
    replicaCount: 1

postgresql:
  persistence:
    enabled: false

redis:
  persistence:
    enabled: false
