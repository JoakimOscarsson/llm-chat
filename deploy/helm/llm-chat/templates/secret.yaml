{{- if not .Values.appSecrets.existingSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-chat.secretName" . }}
  labels:
    {{- include "llm-chat.labels" . | nindent 4 }}
type: Opaque
stringData:
  SESSION_STORE_URL: {{ include "llm-chat.sessionStoreUrl" . | quote }}
  REDIS_URL: {{ include "llm-chat.redisUrl" . | quote }}
  CF_ACCESS_CLIENT_ID: {{ .Values.appSecrets.cfAccessClientId | quote }}
  CF_ACCESS_CLIENT_SECRET: {{ .Values.appSecrets.cfAccessClientSecret | quote }}
  METRICS_CF_ACCESS_CLIENT_ID: {{ .Values.appSecrets.metricsCfAccessClientId | quote }}
  METRICS_CF_ACCESS_CLIENT_SECRET: {{ .Values.appSecrets.metricsCfAccessClientSecret | quote }}
{{- end }}
