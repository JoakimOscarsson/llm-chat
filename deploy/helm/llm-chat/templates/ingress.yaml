{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "llm-chat.fullname" . }}
  labels:
    {{- include "llm-chat.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "llm-chat.serviceName" (dict "root" . "name" "api-gateway") }}
                port:
                  number: {{ index .Values.services "api-gateway" "servicePort" }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llm-chat.serviceName" (dict "root" . "name" "web") }}
                port:
                  number: {{ index .Values.services "web" "servicePort" }}
{{- end }}
