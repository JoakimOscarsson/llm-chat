name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-in-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Docker validation
        run: npm run ci:docker:validate

  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Docker static analysis
        run: npm run ci:docker:static-analysis

  helm-packaging:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Helm packaging validation
        run: npm run ci:helm

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run compose startup smoke test
        run: npm run ci:compose:smoke

  host-metrics-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run host metrics smoke test
        run: npm run ci:host-metrics:smoke

  e2e-selector-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run E2E selector lint
        run: npm run ci:e2e:lint

  coverage-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate coverage reports
        run: npm run ci:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage
          if-no-files-found: ignore
