name: Kubernetes E2E

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  kind-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kind
        uses: engineerd/setup-kind@v0.6.2

      - name: Build application image
        run: docker build -f docker/runtime.Dockerfile -t llm-chat-e2e:ci .

      - name: Build host metrics image
        run: docker build --build-arg MOCK_NVIDIA_SMI=1 -f host-metrics-server/Dockerfile -t llm-chat-host-metrics-e2e:ci .

      - name: Create kind cluster
        run: kind create cluster --name llm-chat --wait 120s

      - name: Load image into kind
        run: |
          kind load docker-image llm-chat-e2e:ci --name llm-chat
          kind load docker-image llm-chat-host-metrics-e2e:ci --name llm-chat

      - name: Create namespace
        run: kubectl create namespace llm-chat --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy stub host metrics server
        run: |
          kubectl apply -n llm-chat -f - <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: host-metrics-server
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: host-metrics-server
            template:
              metadata:
                labels:
                  app: host-metrics-server
              spec:
                containers:
                  - name: host-metrics-server
                    image: llm-chat-host-metrics-e2e:ci
                    imagePullPolicy: IfNotPresent
                    env:
                      - name: PORT
                        value: "4010"
                      - name: HOST_METRICS_GPU_INDEX
                        value: "0"
                      - name: HOST_METRICS_CMD_TIMEOUT_MS
                        value: "2000"
                    ports:
                      - containerPort: 4010
                        name: http
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: http
                      initialDelaySeconds: 2
                      periodSeconds: 5
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: host-metrics-server
          spec:
            selector:
              app: host-metrics-server
            ports:
              - port: 4010
                targetPort: http
                protocol: TCP
                name: http
          EOF

      - name: Build chart dependencies
        run: helm dependency build deploy/helm/llm-chat

      - name: Install chart into kind
        run: |
          helm upgrade --install llm-chat deploy/helm/llm-chat \
            --namespace llm-chat \
            -f deploy/helm/llm-chat/values-kind-ci.yaml \
            --set image.repository=llm-chat-e2e \
            --set image.tag=ci \
            --set image.pullPolicy=IfNotPresent \
            --set-string metrics.baseUrl=http://host-metrics-server.llm-chat.svc.cluster.local:4010

      - name: Wait for deployments
        run: |
          kubectl -n llm-chat rollout status statefulset/llm-chat-postgresql --timeout=300s
          kubectl -n llm-chat rollout status statefulset/llm-chat-redis --timeout=300s
          kubectl -n llm-chat wait --for=condition=available deployment/host-metrics-server --timeout=300s
          kubectl -n llm-chat wait --for=condition=available deployment --all --timeout=300s

      - name: Port-forward web service
        run: |
          kubectl -n llm-chat port-forward svc/llm-chat-llm-chat-web 3000:80 >/tmp/llm-chat-port-forward.log 2>&1 &
          echo $! >/tmp/llm-chat-port-forward.pid

      - name: Wait for web endpoint
        run: |
          for _ in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3000 >/tmp/llm-chat-e2e-home.html; then
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for the port-forwarded web endpoint." >&2
          exit 1

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E against kind
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: pnpm test:e2e

      - name: Collect Kubernetes diagnostics on failure
        if: failure()
        run: |
          if ! kubectl config current-context >/dev/null 2>&1; then
            echo "No active Kubernetes context is available for diagnostics." >&2
            exit 0
          fi
          kubectl -n llm-chat get all -o wide
          kubectl -n llm-chat describe pods
          kubectl -n llm-chat logs deployment/llm-chat-llm-chat-web --tail=200 || true
          kubectl -n llm-chat logs deployment/llm-chat-llm-chat-api-gateway --tail=200 || true
          kubectl -n llm-chat logs deployment/llm-chat-llm-chat-chat-service --tail=200 || true
          kubectl -n llm-chat logs deployment/llm-chat-llm-chat-session-service --tail=200 || true
          kubectl -n llm-chat logs deployment/llm-chat-llm-chat-ollama-adapter --tail=200 || true
          cat /tmp/llm-chat-port-forward.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-kind-report
          path: |
            playwright-report
            test-results
            /tmp/llm-chat-port-forward.log
          if-no-files-found: ignore

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name llm-chat
